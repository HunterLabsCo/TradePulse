        <h1>TradePulse — Voice Trade Journal</h1>
        <p>TradePulse is a voice-first trading journal built for crypto and memecoin traders. Describe your trade out loud and AI fills in the details automatically — no typing, no friction.</p>
        <h2>Features</h2>
        <ul>
          <li><strong>Voice logging</strong> — Record your trade entry by speaking. AI parses token name, market cap, position size, setup type, and more.</li>
          <li><strong>Emotional tracking</strong> — Log your psychological state at entry, mid-trade, and exit to identify patterns in your decision-making.</li>
          <li><strong>PnL tracking</strong> — Track wins, losses, and overall performance. Stats update in real time as you log exits.</li>
          <li><strong>Full trade journal</strong> — Search and filter your trade history. Review exits, updates, and notes on every trade.</li>
          <li><strong>Multi-chain support</strong> — Solana (SOL), Ethereum (ETH), Base, BNB, and Arbitrum.</li>
          <li><strong>Pro plan</strong> — Unlimited trades. Upgrade by paying directly in SOL or USDC via your Solana wallet (Phantom, Solflare, Backpack).</li>
          <li><strong>PWA</strong> — Install on your phone for instant access, no app store required.</li>
        </ul>
        <p>Built for active traders who need to capture trade context quickly without breaking focus. Free for your first 20 trades.</p>
        <p>JavaScript is required to use TradePulse. Please enable JavaScript or visit <a href="https://tradepulse-app.vercel.app" style="color:#7dff4f;">tradepulse-app.vercel.app</a> in a JavaScript-enabled browser.</p>
